{{ define "main" }}

<article class="post-single search-page-custom">

  <header class="post-header">
    {{ if .Params.ShowBreadCrumbs }}
    {{ partial "breadcrumbs.html" . }}
    {{ end }}

    <h1 class="post-title">
      {{ .Title }} <span class="search-title-icon">⌕</span>
    </h1>
  </header>

<div class="search-box-custom">
  <input
    id="searchInput"
    type="text"
    placeholder="{{ .Params.placeholder | default "搜索本站内容" }}"
    autocomplete="off"
    autofocus
  >

  <button id="clearSearch" class="search-clear-btn" type="button" aria-label="Clear search">
    ×
  </button>
</div>

  <div id="searchStatus" class="search-status-custom">
    输入关键词搜索本站内容。
  </div>

  <div id="searchResults" class="search-results-custom"></div>

</article>

<script>
  let searchIndex = [];

  async function buildSearchIndex() {
    const status = document.getElementById("searchStatus");

    try {
      const response = await fetch("{{ "index.json" | relURL }}");

      if (!response.ok) {
        throw new Error("Failed to load search index");
      }

      const rawIndex = await response.json();

      searchIndex = rawIndex.map(item => {
        return {
          title: stripHTML(item.title || ""),
          permalink: item.permalink || item.url || "#",
          summary: stripHTML(item.summary || ""),
          content: stripHTML(item.content || "")
        };
      });

      status.textContent = "输入关键词搜索本站内容。";
    } catch (error) {
      status.textContent = "搜索索引读取失败。请使用 hugo server 或 GitHub Pages 访问。";
    }
  }

  function stripHTML(html) {
    const div = document.createElement("div");
    div.innerHTML = html;
    return (div.textContent || div.innerText || "").replace(/\s+/g, " ").trim();
  }

  function escapeHTML(str) {
    if (!str) return "";

    return str.replace(/[&<>"']/g, function (match) {
      return {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[match];
    });
  }

  function escapeRegExp(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function highlightKeyword(text, keyword) {
    const safeText = escapeHTML(text);
    const safeKeyword = escapeRegExp(keyword);

    if (!safeKeyword) return safeText;

    const reg = new RegExp("(" + safeKeyword + ")", "gi");
    return safeText.replace(reg, "<mark>$1</mark>");
  }

  function getSearchText(item) {
    return [
      item.title || "",
      item.summary || "",
      item.content || ""
    ].join(" ");
  }

  function getSnippet(text, keyword) {
    const lowerText = text.toLowerCase();
    const lowerKeyword = keyword.toLowerCase();
    const index = lowerText.indexOf(lowerKeyword);

    if (index === -1) {
      const shortText = text.slice(0, 220);
      return shortText + (text.length > 220 ? "..." : "");
    }

    const start = Math.max(0, index - 80);
    const end = Math.min(text.length, index + keyword.length + 160);

    let snippet = text.slice(start, end);

    if (start > 0) snippet = "..." + snippet;
    if (end < text.length) snippet = snippet + "...";

    return snippet;
  }

  function searchSite() {
    const input = document.getElementById("searchInput");
    const keyword = input.value.trim();
    const lowerKeyword = keyword.toLowerCase();

    const status = document.getElementById("searchStatus");
    const resultsBox = document.getElementById("searchResults");

    resultsBox.innerHTML = "";

    if (keyword === "") {
      status.textContent = "输入关键词搜索本站内容。";
      return;
    }

    const results = searchIndex.filter(item => {
      const text = getSearchText(item).toLowerCase();
      return text.includes(lowerKeyword);
    });

    if (results.length === 0) {
      status.innerHTML = `没有找到 <b>${escapeHTML(keyword)}</b> 的相关结果。`;
      return;
    }

    status.innerHTML = `找到 <b>${results.length}</b> 个 <b>${escapeHTML(keyword)}</b> 的相关结果。`;

    results.forEach(item => {
      const title = item.title || "Untitled";
      const url = item.permalink || "#";
      const text = getSearchText(item);
      const snippet = getSnippet(text, keyword);

      const result = document.createElement("a");
      result.className = "search-result-item-custom";
      result.href = url;

      result.innerHTML = `
        <div class="search-result-title-custom">
          ${highlightKeyword(title, keyword)}
        </div>

        <div class="search-result-snippet-custom">
          ${highlightKeyword(snippet, keyword)}
        </div>
      `;

      resultsBox.appendChild(result);
    });
  }

  document.getElementById("searchInput").addEventListener("input", searchSite);
document.getElementById("searchInput").addEventListener("input", function () {
  const clearBtn = document.getElementById("clearSearch");

  if (this.value.trim() !== "") {
    clearBtn.classList.add("is-visible");
  } else {
    clearBtn.classList.remove("is-visible");
  }
});

document.getElementById("clearSearch").addEventListener("click", function () {
  const input = document.getElementById("searchInput");
  const resultsBox = document.getElementById("searchResults");
  const status = document.getElementById("searchStatus");

  input.value = "";
  resultsBox.innerHTML = "";
  status.textContent = "输入关键词搜索本站内容。";
  this.classList.remove("is-visible");
  input.focus();
});
  buildSearchIndex();
</script>

{{ end }}
